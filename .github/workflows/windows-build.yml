name: Windows Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - ".github/workflows/windows-build.yml"

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests and production build
        run: npm run check

      - name: Build Windows installer
        run: npm run dist:win

      - name: Smoke launch packaged desktop app
        shell: pwsh
        run: |
          $app = Start-Process -FilePath "release\win-unpacked\MH Sample FL.exe" -ArgumentList "--disable-gpu" -PassThru
          Start-Sleep -Seconds 8
          if ($app.HasExited) {
            throw "Packaged desktop app exited during smoke launch with code $($app.ExitCode)"
          }
          Stop-Process -Id $app.Id -Force

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: MH-Sample-FL-Windows-${{ github.sha }}
          path: |
            release/*.exe
            release/*.yml
          if-no-files-found: error
          retention-days: 14
